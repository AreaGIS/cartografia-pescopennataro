<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cartografia Pescopennataro</title>

    <!-- Fogli di stile CSS di Leaflet e Bootstrap -->
    <link rel="stylesheet" href="https://jsdelivr.net" />
    <link rel="stylesheet" href="https://jsdelivr.net" />
    <link rel="stylesheet" href="https://cloudflare.com" />

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        .leaflet-container {
            font-size: 13px;
        }
        /* Personalizzazione minimale del popup */
        .custom-popup-title {
            margin: 0 0 5px 0;
            color: #1b5e20;
            border-bottom: 1px solid #ddd;
            padding-bottom: 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Script JS di supporto, Leaflet e jQuery -->
    <script src="https://jquery.com"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>

    <script>
        // ============================================================
        // 1. INIZIALIZZAZIONE DELLA MAPPA E SFONDI (BASE LAYERS)
        // ============================================================
        // Centrato sul Bosco degli Abeti Soprani a Pescopennataro
        var map = L.map('map').setView([41.871, 14.292], 14);

        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        var satellite = L.tileLayer('https://arcgisonline.com{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        });

        var baseMaps = {
            "OpenStreetMap": osm,
            "Satellite": satellite
        };

        // ============================================================
        // 2. CONFIGURAZIONE DEI FILTRI / STRATI GEOJSON (OVERLAYS)
        // ============================================================
        // Elenco strutturato di tutti i tuoi file ambientali estratti da QGIS
        const configurazioneLayer = [
            { nome: "Abetine Appenniniche", file: "Abetine dell'Appennino centrale e meridionale.geojson", colore: "#1b5e20" },
            { nome: "Boschi di Conifere", file: "Boschi di conifere aloctone o fuori dal loro areale.geojson", colore: "#2e7d32" },
            { nome: "Boschi di Ostrya", file: "Boschi di Ostrya carpinifolia.geojson", colore: "#4caf50" },
            { nome: "Pioppeti Ripariali", file: "Boschi ripariali a pioppo.geojson", colore: "#00796b" },
            { nome: "Saliceti Temperati", file: "Boschi ripariali temperati di salici.geojson", colore: "#009688" },
            { nome: "Faggete Meridionali", file: "Faggete dell'Italia meridionale.geojson", colore: "#8d6e63" },
            { nome: "Ginepreti", file: "Ginepreti collinari e montani.geojson", colore: "#a1887f" },
            { nome: "Querceti a Cerro", file: "Querceti temperati a cerro.geojson", colore: "#ff9800" },
            { nome: "Praterie da sfalcio", file: "Praterie da sfalcio parzialmente coltivate.geojson", colore: "#d4e157" },
            { nome: "Praterie mesofile", file: "Praterie mesofile pascolate.geojson", colore: "#cddc39" },
            { nome: "Praterie xero-mesofile", file: "Praterie xero-mesofile temperate e submediterranee.geojson", colore: "#afb42b" },
            { nome: "Praterie xeriche", file: "Praterie xeriche dell'Italia centrale e meridionale.geojson", colore: "#9e9d24" },
            { nome: "Cespuglieti temperati", file: "Cespuglieti temperati a latifoglie decidue dei suoli ricchi.geojson", colore: "#81c784" },
            { nome: "Colture estensive", file: "Colture estensive.geojson", colore: "#fff59d" },
            { nome: "Rupi carbonatiche", file: "Rupi carbonatiche dei rilievi dell'Appennino centro-meridionale.geojson", colore: "#b0bec5" },
            { nome: "Centri Abitati", file: "Centri abitati e infrastrutture viarie e ferroviarie.geojson", colore: "#757575" },
            { nome: "Siti produttivi", file: "Siti produttivi, commerciali e grandi impianti.geojson", colore: "#37474f" }
        ];

        // Oggetto che conterrà i gruppi per la legenda di Leaflet
        const overlayMaps = {};

        // Inizializza il controllo dei layer (Legenda) sulla mappa
        const controlloLayer = L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);

        // ============================================================
        // 3. FUNZIONE DI POPUP UNIFICATA PER TUTTI I VETTORI
        // ============================================================
        function popUpGenerico(feature, layer) {
            if (feature.properties) {
                let contenuto = `
                    <div style="line-height: 1.5;">
                        <h5 class="custom-popup-title">
                            ${feature.properties.nomeclasse || "Unità Cartografica"}
                        </h5>
                        <b>Estensione:</b> ${feature.properties.ettari ? parseFloat(feature.properties.ettari).toFixed(2) : "N/D"} ha<br>
                        <b>Valore Ecologico (VE):</b> ${feature.properties.classe_ve || "N/D"}<br>
                        <b>Valore Strutturale (SE):</b> ${feature.properties.classe_se || "N/D"}<br>
                        <b>Valore Faunistico (FG):</b> ${feature.properties.classe_fg || "N/D"}
                    </div>`;
                layer.bindPopup(contenuto);
            }
        }

        // ============================================================
        // 4. CICLO ITERATIVO DI CARICAMENTO DEI FILE GEOJSON
        // ============================================================
        configurazioneLayer.forEach(strato => {
            // Crea un contenitore grafico per il layer specifico
            const gruppoLayer = L.layerGroup();
            
            // Aggiunge la voce dinamicamente alla legenda
            controlloLayer.addOverlay(gruppoLayer, strato.nome);

            // Carica in modo asincrono il file GeoJSON dalla root del repository
            fetch(`./${strato.file}`)
                .then(response => {
                    if (!response.ok) throw new Error(`Impossibile leggere il file ${strato.file}`);
                    return response.json();
                })
                .then(data => {
                    L.geoJSON(data, {
                        style: {
                            color: strato.colore,      // Colore del contorno del poligono
                            fillColor: strato.colore,  // Colore del riempimento
                            weight: 1.5,               // Spessore della linea esterna
                            fillOpacity: 0.35          // Trasparenza dell'area interna
                        },
                        onEachFeature: popUpGenerico
                    }).addTo(gruppoLayer);
                })
                .catch(error => {
                    console.error(`Errore nel caricamento del file: ${strato.file}`, error);
                });
        });

        // Ad esempio, rendiamo attive le Abetine subito all'avvio della mappa per non mostrare lo schermo vuoto
        // Nota: i dati compariranno non appena la chiamata asincrona fetch() sarà completata.
        setTimeout(() => {
            map.eachLayer(function(layer) {
                // Cerchiamo il controllo per attivarlo graficamente se necessario
            });
        }, 500);

    </script>
</body>
</html>
