<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartografia Pescopennataro - Rilievi fotografici</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    html, body { height: 100%; margin: 0; font-family: Arial, Helvetica, sans-serif; }
    #map { position: fixed; inset: 0; width: 100%; height: 100%; background: #eef2f3; }
    .topbar { position: absolute; top: 14px; left: 14px; z-index: 1000; display: flex; gap: 8px; }
    .map-btn { border: 0; border-radius: 10px; padding: 10px 12px; background: #fff; box-shadow: 0 2px 10px rgba(0,0,0,.18); cursor: pointer; font-weight: 700; }
    .map-btn.active { background: #2d6a4f; color: #fff; }
    #panel { position: absolute; top: 62px; left: 14px; z-index: 1000; width: 330px; max-height: calc(100vh - 90px); overflow: auto; background: rgba(255,255,255,.96); border-radius: 14px; box-shadow: 0 2px 18px rgba(0,0,0,.22); padding: 14px; }
    #panel.hidden { display: none; }
    #panel h2 { margin: 0 0 10px; font-size: 16px; }
    .bulk { display: flex; gap: 8px; margin-bottom: 10px; }
    .bulk button { flex: 1; border: 1px solid #ddd; border-radius: 8px; background: #f8f8f8; padding: 8px; cursor: pointer; }
    .layer-row { display: flex; align-items: center; gap: 8px; padding: 7px 4px; border-bottom: 1px solid #eee; cursor: pointer; user-select: none; }
    .layer-row:hover { background: #f5f7f5; }
    .layer-checkbox { width: 18px; height: 18px; border: 2px solid #ccc; border-radius: 5px; display: grid; place-items: center; flex: 0 0 auto; }
    .layer-checkbox svg { display: none; width: 13px; height: 13px; }
    .layer-swatch { width: 18px; height: 18px; border-radius: 5px; flex: 0 0 auto; opacity: .9; }
    .layer-name { font-size: 13px; line-height: 1.2; }
    .leaflet-popup-content-wrapper { border-radius: 12px; }
    .popup-inner { width: 300px; max-width: 72vw; }
    .popup-row { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; font-size: 13px; }
    .popup-label { color: #666; font-weight: 700; }
    .popup-val { color: #222; }
    .popup-photo { margin-top: 8px; width: 100%; }
    .popup-photo img { display: block; width: 100%; max-height: 360px; object-fit: contain; border-radius: 10px; background: #f1f1f1; }
    .no-photo { display: block; padding: 16px; text-align: center; color: #777; background: #f1f1f1; border-radius: 8px; }
    #info-overlay { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,.35); align-items: center; justify-content: center; padding: 20px; }
    #info-overlay.visible { display: flex; }
    .info-box { max-width: 620px; background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 4px 22px rgba(0,0,0,.25); }
    .info-box button { float: right; }

    .rilievo-marker { width: 16px; height: 16px; margin-left: -8px; margin-top: -8px; border-radius: 50%; background: #2d6a4f; border: 2px solid #fff; box-shadow: 0 1px 6px rgba(0,0,0,.35); box-sizing: border-box; cursor: pointer; }
    .leaflet-marker-pane { z-index: 700 !important; }
    .leaflet-overlay-pane { z-index: 400 !important; }
    .leaflet-geojson-pane, .leaflet-geojson-pane svg, .leaflet-geojson-pane path { pointer-events: none !important; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="topbar">
    <button id="btn-toggle" class="map-btn" onclick="togglePanel()">Layer</button>
    <button class="map-btn" onclick="toggleInfo()">Info</button>
  </div>
  <div id="panel">
    <h2>Layer cartografici</h2>
    <div class="bulk"><button id="btn-all" onclick="selectAll()">Tutti</button><button id="btn-none" onclick="selectNone()">Nessuno</button></div>
    <div id="layer-list"></div>
  </div>
  <div id="info-overlay" onclick="closeInfoOnOverlay(event)"><div class="info-box"><button onclick="toggleInfo()">Chiudi</button><h2>Informazioni</h2><p>Mappa interattiva dei rilievi fotografici e dei layer cartografici.</p></div></div>
<script>
  const PHOTO_BASE = "https://raw.githubusercontent.com/AreaGIS/Pescopennataro-Foto/main/files/";
  const MARKERS = [
    { id:26, lat:41.8623117, lng:14.2937433, date:"07/11/2025", alt:1310, photo:"p_2025-11-07_12-_20251107_121738.jpg" },
    { id:27, lat:41.8623117, lng:14.2937317, date:"07/11/2025", alt:1321, photo:"p_2025-11-07_12-_20251107_121931.jpg" },
    { id:28, lat:41.86239,   lng:14.293005,  date:"07/11/2025", alt:1308, photo:"p_2025-11-07_12-_20251107_122846.jpg" },
    { id:29, lat:41.8534883, lng:14.2894767, date:"07/11/2025", alt:1438, photo:"p_2025-11-07_13-_20251107_135002.jpg" },
    { id:30, lat:41.8523033, lng:14.2895417, date:"07/11/2025", alt:1464, photo:"p_2025-11-07_14-_20251107_140338.jpg" },
    { id:31, lat:41.8522883, lng:14.2895733, date:"07/11/2025", alt:1470, photo:"p_2025-11-07_14-_20251107_140446.jpg" },
    { id:32, lat:41.8523033, lng:14.289805,  date:"07/11/2025", alt:1471, photo:"p_2025-11-07_14-_20251107_140616.jpg" },
    { id:33, lat:41.8516383, lng:14.2901917, date:"07/11/2025", alt:1469, photo:"p_2025-11-07_14-_20251107_141104.jpg" },
    { id:34, lat:41.8511883, lng:14.2921333, date:"07/11/2025", alt:1472, photo:"p_2025-11-07_14-_20251107_142707.jpg" },
    { id:35, lat:41.85142,   lng:14.29232,   date:"07/11/2025", alt:1476, photo:"p_2025-11-07_14-_20251107_142954.jpg" },
    { id:36, lat:41.8522967, lng:14.2901567, date:"07/11/2025", alt:1432, photo:"p_2025-11-07_14-_20251107_143959.jpg" },
  ];

  const GEOJSON_LAYERS = [
    { id:"limite",        name:"Limite amministrativo",           file:"Pescopennataro - Limite amministrativo.geojson",                       color:"#1a1a2e", fill:0.05, weight:2.5 },
    { id:"faggete",       name:"Faggete Italia meridionale",       file:"Faggete dell\u2019Italia meridionale.geojson",                         color:"#1b4332", fill:0.45, weight:1   },
    { id:"abetine",       name:"Abetine App. centrale e merid.",   file:"Abetine dell\u2019Appennino centrale e meridionale.geojson",           color:"#081c15", fill:0.45, weight:1   },
    { id:"ostrya",        name:"Boschi di Ostrya carpinifolia",    file:"Boschi di Ostrya carpinifolia.geojson",                                color:"#2d6a4f", fill:0.45, weight:1   },
    { id:"conifere",      name:"Boschi conifere alloctone",        file:"Boschi di conifere alloctone o fuori dal loro areale.geojson",         color:"#40916c", fill:0.45, weight:1   },
    { id:"pioppi",        name:"Boschi ripariali a pioppi",        file:"Boschi ripariali a pioppi.geojson",                                    color:"#52b788", fill:0.45, weight:1   },
    { id:"salici",        name:"Boschi ripariali di salici",       file:"Boschi ripariali temperati di salici.geojson",                         color:"#74c69d", fill:0.45, weight:1   },
    { id:"querceti",      name:"Querceti temperati a cerro",       file:"Querceti temperati a cerro.geojson",                                   color:"#7b4f12", fill:0.45, weight:1   },
    { id:"cespuglieti",   name:"Cespuglieti a latifoglie decidue", file:"Cespuglieti temperati a latifoglie decidue dei suoli ricchi.geojson",  color:"#a7c957", fill:0.45, weight:1   },
    { id:"ginepreti",     name:"Ginepreti collinari e montani",    file:"Ginepreti collinari e montani.geojson",                                color:"#606c38", fill:0.45, weight:1   },
    { id:"prat-sfalcio",  name:"Praterie da sfalcio",              file:"Praterie da sfalcio planiziali, collinari e montane.geojson",          color:"#a8dadc", fill:0.45, weight:1   },
    { id:"prat-mesiche",  name:"Praterie mesiche temperate",       file:"Praterie mesiche temperate e supramediterranee.geojson",               color:"#57cc99", fill:0.45, weight:1   },
    { id:"prat-mesofile", name:"Praterie mesofile pascolate",      file:"Praterie mesofile pascolate.geojson",                                  color:"#80b918", fill:0.45, weight:1   },
    { id:"prat-xeriche",  name:"Praterie xeriche Italia C-M",      file:"Praterie xeriche dell\u2019Italia centrale e meridionale.geojson",     color:"#d4e157", fill:0.45, weight:1   },
    { id:"colture",       name:"Colture estensive",                file:"Colture estensive.geojson",                                            color:"#e9c46a", fill:0.45, weight:1   },
    { id:"rupi",          name:"Rupi carbonatiche",                file:"Rupi carbonatiche dei rilievi del Mediterraneo occidentale.geojson",   color:"#9e9e9e", fill:0.45, weight:1   },
    { id:"centri",        name:"Centri abitati e infrastrutture",  file:"Centri abitati e infrastrutture viarie e ferroviarie.geojson",         color:"#6b705c", fill:0.50, weight:1.5 },
    { id:"siti",          name:"Siti produttivi e commerciali",    file:"Siti produttivi, commerciali e grandi nodi infrastrutturali.geojson",  color:"#e63946", fill:0.50, weight:1.5 },
  ];
  const RAW_BASE = "https://raw.githubusercontent.com/AreaGIS/cartografia-pescopennataro/main/";

  const map = L.map("map", { zoomControl: false }).setView([41.86, 14.29], 14);
  // Pane separato per i GeoJSON: sono visibili ma non catturano i click.
  map.createPane("geojsonPane");
  map.getPane("geojsonPane").style.zIndex = 350;
  map.getPane("geojsonPane").style.pointerEvents = "none";
  // I marker HTML standard restano nel markerPane, sempre sopra i layer poligonali.
  map.getPane("markerPane").style.zIndex = 700;
  map.getPane("markerPane").style.pointerEvents = "auto";

  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a>",
    maxZoom: 19
  }).addTo(map);

  const rilievoIcon = L.divIcon({
    className: "rilievo-marker",
    iconSize: [16, 16],
    iconAnchor: [8, 8],
    popupAnchor: [0, -8]
  });
  const markersLayer = L.layerGroup().addTo(map);

  function ensurePopupFullyVisible() {
    setTimeout(function() {
      const popup = map._popup;
      if (!popup || !popup._container) return;
      const mapBox = map.getContainer().getBoundingClientRect();
      const popBox = popup._container.getBoundingClientRect();
      const padding = 26;
      let dx = 0, dy = 0;
      if (popBox.left < mapBox.left + padding) dx = popBox.left - mapBox.left - padding;
      else if (popBox.right > mapBox.right - padding) dx = popBox.right - mapBox.right + padding;
      if (popBox.top < mapBox.top + padding) dy = popBox.top - mapBox.top - padding;
      else if (popBox.bottom > mapBox.bottom - padding) dy = popBox.bottom - mapBox.bottom + padding;
      if (dx || dy) map.panBy([dx, dy], { animate: true, duration: 0.25 });
    }, 80);
  }

  MARKERS.forEach(function(m) {
    const popupContent =
      '<div class="popup-inner">' +
        '<div class="popup-row"><span class="popup-label">Data</span><span class="popup-val">' + m.date + '</span></div>' +
        '<div class="popup-row"><span class="popup-label">Altitudine</span><span class="popup-val">' + m.alt + ' m</span></div>' +
        '<div class="popup-row"><span class="popup-label">Punto</span><span class="popup-val">#' + m.id + '</span></div>' +
        '<div class="popup-photo"><img src="' + PHOTO_BASE + m.photo + '" loading="lazy" alt="Foto ' + m.id + '" ' +
          'onload="if(window.__ensurePopup)window.__ensurePopup()" ' +
          'onerror="this.style.display=&quot;none&quot;;this.parentNode.innerHTML=&quot;&lt;span class=\&quot;no-photo\&quot;&gt;Foto non disponibile&lt;/span&gt;&quot;" /></div>' +
      '</div>';
    const marker = L.marker([m.lat, m.lng], {
      icon: rilievoIcon,
      pane: "markerPane",
      keyboard: true,
      title: "Rilievo #" + m.id
    }).bindPopup(L.popup({
      maxWidth: 360,
      autoPan: true,
      keepInView: true,
      autoPanPadding: L.point(70, 70)
    }).setContent(popupContent));
    marker.on("popupopen", ensurePopupFullyVisible);
    marker.addTo(markersLayer);
  });

  window.__ensurePopup = ensurePopupFullyVisible;
  map.on("popupopen", ensurePopupFullyVisible);
  window.addEventListener("resize", ensurePopupFullyVisible);

  const layerCache = {};
  const layerActive = {};
  const DEFAULT_ON = ["limite"];

  function bringMarkersFront() {
    markersLayer.eachLayer(function(layer) {
      if (layer.setZIndexOffset) layer.setZIndexOffset(10000);
      if (layer.bringToFront) layer.bringToFront();
    });
  }

  function buildLayerList() {
    const container = document.getElementById("layer-list");
    GEOJSON_LAYERS.forEach(function(def) {
      layerActive[def.id] = false;
      const row = document.createElement("div");
      row.className = "layer-row";
      row.innerHTML = '<div class="layer-checkbox" id="chk-' + def.id + '"><svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="2"><polyline points="1.5,5 4,7.5 8.5,2"/></svg></div><div class="layer-swatch" style="background:' + def.color + '"></div><span class="layer-name">' + def.name + '</span>';
      row.onclick = function() { toggleLayer(def.id, def); };
      container.appendChild(row);
      if (DEFAULT_ON.includes(def.id)) toggleLayer(def.id, def);
    });
  }

  function setCheck(id, def, active) {
    const chk = document.getElementById("chk-" + id);
    if (!chk) return;
    chk.style.borderColor = active ? def.color : "#ccc";
    chk.style.background = active ? def.color : "transparent";
    const svg = chk.querySelector("svg");
    if (svg) svg.style.display = active ? "block" : "none";
  }

  function toggleLayer(id, def) {
    if (!def) def = GEOJSON_LAYERS.find(function(l) { return l.id === id; });
    const nowActive = !layerActive[id];
    layerActive[id] = nowActive;
    setCheck(id, def, nowActive);
    if (nowActive) {
      if (layerCache[id]) { map.addLayer(layerCache[id]); bringMarkersFront(); }
      else {
        fetch(RAW_BASE + encodeURIComponent(def.file))
          .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(function(gj) {
            const lyr = L.geoJSON(gj, {
              pane: "geojsonPane",
              interactive: false,
              bubblingMouseEvents: false,
              style: function() { return { color:def.color, weight:def.weight, opacity:0.9, fillColor:def.color, fillOpacity:def.fill }; }
            });
            layerCache[id] = lyr;
            if (layerActive[id]) { map.addLayer(lyr); bringMarkersFront(); }
          })
          .catch(function(e) { console.warn("GeoJSON fetch failed:", id, e); });
      }
    } else if (layerCache[id]) { map.removeLayer(layerCache[id]); }
    updateBulkButtons();
    bringMarkersFront();
  }

  function selectAll() { GEOJSON_LAYERS.forEach(function(d) { if (!layerActive[d.id]) toggleLayer(d.id, d); }); }
  function selectNone() { GEOJSON_LAYERS.forEach(function(d) { if (layerActive[d.id]) toggleLayer(d.id, d); }); }
  function updateBulkButtons() {
    document.getElementById("btn-all").disabled = GEOJSON_LAYERS.every(function(l) { return layerActive[l.id]; });
    document.getElementById("btn-none").disabled = GEOJSON_LAYERS.every(function(l) { return !layerActive[l.id]; });
  }

  let panelVisible = true;
  function togglePanel() {
    panelVisible = !panelVisible;
    document.getElementById("panel").classList.toggle("hidden", !panelVisible);
    document.getElementById("btn-toggle").classList.toggle("active", panelVisible);
  }
  document.getElementById("btn-toggle").classList.add("active");

  let infoVisible = false;
  function toggleInfo() { infoVisible = !infoVisible; document.getElementById("info-overlay").classList.toggle("visible", infoVisible); }
  function closeInfoOnOverlay(e) { if (e.target === document.getElementById("info-overlay")) toggleInfo(); }
  document.addEventListener("keydown", function(e) { if (e.key === "Escape" && infoVisible) toggleInfo(); });

  buildLayerList();
  updateBulkButtons();
  bringMarkersFront();
</script>
</body>
</html>
