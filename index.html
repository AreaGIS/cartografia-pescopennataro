<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rilievo Pescopennataro</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f0ea; }

    #map { position: fixed; inset: 0; z-index: 0; }

    /* ── Toggle button ── */
    #btn-toggle {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 1px solid #d1c9bf;
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      cursor: pointer;
      color: #2d6a4f;
      transition: background 0.15s, color 0.15s;
    }
    #btn-toggle:hover { background: #2d6a4f; color: #fff; }
    #btn-toggle svg { pointer-events: none; }

    /* ── Control panel ── */
    #panel {
      position: fixed;
      top: 16px;
      left: 64px;
      z-index: 1000;
      width: 276px;
      max-height: calc(100dvh - 56px);
      background: #ffffff;
      border: 1px solid #d1c9bf;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.2s;
    }
    #panel.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-8px);
    }

    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid #e8e2da;
      background: #f5f0ea;
      flex-shrink: 0;
    }
    .panel-header h1 { font-size: 13px; font-weight: 700; color: #1a1a1a; }
    .panel-header p  { font-size: 11px; color: #6b6459; margin-top: 2px; }

    .panel-body {
      overflow-y: auto;
      flex: 1;
      padding: 14px 16px;
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #1a1a1a;
      margin-bottom: 10px;
    }

    /* Bulk buttons */
    .bulk-btns { display: flex; gap: 6px; margin-bottom: 12px; }
    .bulk-btn {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid #d1c9bf;
      background: #f5f0ea;
      color: #3d3530;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .bulk-btn:hover { background: #2d6a4f; color: #fff; border-color: #2d6a4f; }
    .bulk-btn.danger:hover { background: #c0392b; color: #fff; border-color: #c0392b; }
    .bulk-btn:disabled { opacity: 0.4; cursor: default; }
    .bulk-btn:disabled:hover { background: #f5f0ea; color: #3d3530; border-color: #d1c9bf; }

    /* Layer rows */
    .layer-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      cursor: pointer;
    }
    .layer-row:hover .layer-name { color: #2d6a4f; }

    .layer-checkbox {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 2px solid #ccc;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .layer-checkbox.checked svg { display: block; }
    .layer-checkbox svg { display: none; width: 9px; height: 9px; }

    .layer-swatch {
      width: 12px; height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
      opacity: 0.85;
    }
    .layer-name { font-size: 11.5px; color: #2d2d2d; line-height: 1.35; flex: 1; }

    /* ── Stats bar ── */
    #stats-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(4px);
      border-top: 1px solid #e8e2da;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 11px;
      color: #6b6459;
    }
    #stats-bar strong { color: #1a1a1a; font-weight: 600; }
    .stats-sep { width: 1px; height: 14px; background: #d1c9bf; }

    /* Leaflet popup tweaks */
    .leaflet-popup-content { margin: 0; }
    .popup-inner {
      padding: 10px 12px;
      min-width: 220px;
    }
    .popup-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      padding: 4px 0;
      border-bottom: 1px solid #f0ebe4;
    }
    .popup-row:last-of-type { border-bottom: none; }
    .popup-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #9e9080; }
    .popup-val   { font-size: 12px; font-weight: 500; color: #1a1a1a; }
    .popup-photo {
      width: 300px;
      margin-top: 8px;
      border-radius: 4px;
      overflow: hidden;
      background: #f5f0ea;
      min-height: 80px;
      display: flex; align-items: center; justify-content: center;
    }
    .popup-photo img { width: 100%; height: auto; display: block; }
    .popup-photo .no-photo { font-size: 11px; color: #9e9080; font-style: italic; padding: 20px; }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- Toggle button -->
  <button id="btn-toggle" title="Legenda e layer" onclick="togglePanel()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
    </svg>
  </button>

  <!-- Control panel -->
  <div id="panel">
    <div class="panel-header">
      <h1>Rilievo Pescopennataro</h1>
      <p>36 punti &nbsp;|&nbsp; 2 sessioni di campo</p>
    </div>
    <div class="panel-body">
      <div class="section-title">Layer GeoJSON</div>
      <div class="bulk-btns">
        <button class="bulk-btn" id="btn-all"     onclick="selectAll()">Tutti</button>
        <button class="bulk-btn danger" id="btn-none" onclick="selectNone()">Nessuno</button>
      </div>
      <div id="layer-list"></div>
    </div>
  </div>

  <!-- Stats bar -->
  <div id="stats-bar">
    <span><strong>36</strong> punti di rilievo</span>
    <div class="stats-sep"></div>
    <span>Altitudine: <strong>1281m — 1476m</strong></span>
    <div class="stats-sep"></div>
    <span>02/11/2025 &nbsp;·&nbsp; 07/11/2025</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
  // ── Data ─────────────────────────────────────────────────────────────────────
  const PHOTO_BASE = "https://raw.githubusercontent.com/AreaGIS/Pescopennataro-Foto/main/files/";

  const MARKERS = [
    { id:1,  lat:41.864892,  lng:14.2917636, date:"02/11/2025", alt:1281, photo:"1000180667.jpg" },
    { id:2,  lat:41.8643363, lng:14.290558,  date:"02/11/2025", alt:1297, photo:"p_2025-11-02_09-_20251102_094108.jpg" },
    { id:3,  lat:41.8633132, lng:14.2908792, date:"02/11/2025", alt:1332, photo:"p_2025-11-02_09-_20251102_094920.jpg" },
    { id:4,  lat:41.8632529, lng:14.2908759, date:"02/11/2025", alt:1326, photo:"p_2025-11-02_09-_20251102_095306.jpg" },
    { id:5,  lat:41.8630757, lng:14.2907474, date:"02/11/2025", alt:1316, photo:"p_2025-11-02_09-_20251102_095636.jpg" },
    { id:6,  lat:41.8627402, lng:14.2907328, date:"02/11/2025", alt:1337, photo:"p_2025-11-02_10-_20251102_100130.jpg" },
    { id:7,  lat:41.8614602, lng:14.2912786, date:"02/11/2025", alt:1363, photo:"p_2025-11-02_10-_20251102_101415.jpg" },
    { id:8,  lat:41.8609729, lng:14.2911907, date:"02/11/2025", alt:1354, photo:"p_2025-11-02_10-_20251102_101937.jpg" },
    { id:9,  lat:41.8610766, lng:14.2911532, date:"02/11/2025", alt:1358, photo:"p_2025-11-02_10-_20251102_102212.jpg" },
    { id:10, lat:41.8619525, lng:14.2908016, date:"02/11/2025", alt:1330, photo:"p_2025-11-02_10-_20251102_102950.jpg" },
    { id:11, lat:41.860825,  lng:14.2952483, date:"07/11/2025", alt:1316, photo:"p_2025-11-07_10-_20251107_103119.jpg" },
    { id:12, lat:41.860625,  lng:14.2952,    date:"07/11/2025", alt:1320, photo:"p_2025-11-07_10-_20251107_103935.jpg" },
    { id:13, lat:41.8606883, lng:14.2948367, date:"07/11/2025", alt:1326, photo:"p_2025-11-07_10-_20251107_104250.jpg" },
    { id:14, lat:41.8602667, lng:14.2952383, date:"07/11/2025", alt:1324, photo:"p_2025-11-07_10-_20251107_105155.jpg" },
    { id:15, lat:41.86022,   lng:14.2951183, date:"07/11/2025", alt:1324, photo:"p_2025-11-07_10-_20251107_105254.jpg" },
    { id:16, lat:41.8600633, lng:14.29505,   date:"07/11/2025", alt:1317, photo:"p_2025-11-07_10-_20251107_105710.jpg" },
    { id:17, lat:41.8599783, lng:14.2950267, date:"07/11/2025", alt:1318, photo:"p_2025-11-07_10-_20251107_105949.jpg" },
    { id:18, lat:41.8603467, lng:14.2948717, date:"07/11/2025", alt:1326, photo:"p_2025-11-07_11-_20251107_110443.jpg" },
    { id:19, lat:41.8602033, lng:14.2949417, date:"07/11/2025", alt:1325, photo:"p_2025-11-07_11-_20251107_110854.jpg" },
    { id:20, lat:41.861145,  lng:14.2950583, date:"07/11/2025", alt:1312, photo:"p_2025-11-07_11-_20251107_112010.jpg" },
    { id:21, lat:41.86164,   lng:14.295145,  date:"07/11/2025", alt:1320, photo:"p_2025-11-07_11-_20251107_112757.jpg" },
    { id:22, lat:41.8617083, lng:14.2950733, date:"07/11/2025", alt:1301, photo:"p_2025-11-07_11-_20251107_113135.jpg" },
    { id:23, lat:41.8620017, lng:14.2952233, date:"07/11/2025", alt:1297, photo:"p_2025-11-07_11-_20251107_113628.jpg" },
    { id:24, lat:41.8620383, lng:14.29444,   date:"07/11/2025", alt:1282, photo:"p_2025-11-07_11-_20251107_115302.jpg" },
    { id:25, lat:41.8620417, lng:14.29434,   date:"07/11/2025", alt:1297, photo:"p_2025-11-07_12-_20251107_120458.jpg" },
    { id:26, lat:41.8623117, lng:14.2937433, date:"07/11/2025", alt:1310, photo:"p_2025-11-07_12-_20251107_121738.jpg" },
    { id:27, lat:41.8623117, lng:14.2937317, date:"07/11/2025", alt:1321, photo:"p_2025-11-07_12-_20251107_121931.jpg" },
    { id:28, lat:41.86239,   lng:14.293005,  date:"07/11/2025", alt:1308, photo:"p_2025-11-07_12-_20251107_122846.jpg" },
    { id:29, lat:41.8534883, lng:14.2894767, date:"07/11/2025", alt:1438, photo:"p_2025-11-07_13-_20251107_135002.jpg" },
    { id:30, lat:41.8523033, lng:14.2895417, date:"07/11/2025", alt:1464, photo:"p_2025-11-07_14-_20251107_140338.jpg" },
    { id:31, lat:41.8522883, lng:14.2895733, date:"07/11/2025", alt:1470, photo:"p_2025-11-07_14-_20251107_140446.jpg" },
    { id:32, lat:41.8523033, lng:14.289805,  date:"07/11/2025", alt:1471, photo:"p_2025-11-07_14-_20251107_140616.jpg" },
    { id:33, lat:41.8516383, lng:14.2901917, date:"07/11/2025", alt:1469, photo:"p_2025-11-07_14-_20251107_141104.jpg" },
    { id:34, lat:41.8511883, lng:14.2921333, date:"07/11/2025", alt:1472, photo:"p_2025-11-07_14-_20251107_142707.jpg" },
    { id:35, lat:41.85142,   lng:14.29232,   date:"07/11/2025", alt:1476, photo:"p_2025-11-07_14-_20251107_142954.jpg" },
    { id:36, lat:41.8522967, lng:14.2901567, date:"07/11/2025", alt:1432, photo:"p_2025-11-07_14-_20251107_143959.jpg" },
  ];

  const GEOJSON_LAYERS = [
    { id:"limite",           name:"Limite amministrativo",            file:"Pescopennataro - Limite amministrativo.geojson", color:"#1a1a2e", fill:0.05, weight:2.5 },
    { id:"faggete",          name:"Faggete Italia meridionale",        file:"Faggete dell\u2019Italia meridionale.geojson",                  color:"#1b4332", fill:0.45, weight:1 },
    { id:"abetine",          name:"Abetine App. centrale e merid.",    file:"Abetine dell\u2019Appennino centrale e meridionale.geojson",     color:"#081c15", fill:0.45, weight:1 },
    { id:"ostrya",           name:"Boschi di Ostrya carpinifolia",     file:"Boschi di Ostrya carpinifolia.geojson",                         color:"#2d6a4f", fill:0.45, weight:1 },
    { id:"conifere",         name:"Boschi conifere alloctone",         file:"Boschi di conifere alloctone o fuori dal loro areale.geojson",  color:"#40916c", fill:0.45, weight:1 },
    { id:"pioppi",           name:"Boschi ripariali a pioppi",         file:"Boschi ripariali a pioppi.geojson",                             color:"#52b788", fill:0.45, weight:1 },
    { id:"salici",           name:"Boschi ripariali di salici",        file:"Boschi ripariali temperati di salici.geojson",                  color:"#74c69d", fill:0.45, weight:1 },
    { id:"querceti",         name:"Querceti temperati a cerro",        file:"Querceti temperati a cerro.geojson",                            color:"#7b4f12", fill:0.45, weight:1 },
    { id:"cespuglieti",      name:"Cespuglieti a latifoglie decidue",  file:"Cespuglieti temperati a latifoglie decidue dei suoli ricchi.geojson", color:"#a7c957", fill:0.45, weight:1 },
    { id:"ginepreti",        name:"Ginepreti collinari e montani",     file:"Ginepreti collinari e montani.geojson",                         color:"#606c38", fill:0.45, weight:1 },
    { id:"prat-sfalcio",     name:"Praterie da sfalcio",               file:"Praterie da sfalcio planiziali, collinari e montane.geojson",   color:"#a8dadc", fill:0.45, weight:1 },
    { id:"prat-mesiche",     name:"Praterie mesiche temperate",        file:"Praterie mesiche temperate e supramediterranee.geojson",         color:"#57cc99", fill:0.45, weight:1 },
    { id:"prat-mesofile",    name:"Praterie mesofile pascolate",       file:"Praterie mesofile pascolate.geojson",                           color:"#80b918", fill:0.45, weight:1 },
    { id:"prat-xeriche",     name:"Praterie xeriche Italia C-M",       file:"Praterie xeriche dell\u2019Italia centrale e meridionale.geojson", color:"#d4e157", fill:0.45, weight:1 },
    { id:"colture",          name:"Colture estensive",                 file:"Colture estensive.geojson",                                     color:"#e9c46a", fill:0.45, weight:1 },
    { id:"rupi",             name:"Rupi carbonatiche",                 file:"Rupi carbonatiche dei rilievi del Mediterraneo occidentale.geojson", color:"#9e9e9e", fill:0.45, weight:1 },
    { id:"centri",           name:"Centri abitati e infrastrutture",   file:"Centri abitati e infrastrutture viarie e ferroviarie.geojson",  color:"#6b705c", fill:0.50, weight:1.5 },
    { id:"siti",             name:"Siti produttivi e commerciali",     file:"Siti produttivi, commerciali e grandi nodi infrastrutturali.geojson", color:"#e63946", fill:0.50, weight:1.5 },
  ];

  const RAW_BASE = "https://raw.githubusercontent.com/AreaGIS/cartografia-pescopennataro/main/";

  // ── Map init ─────────────────────────────────────────────────────────────────
  const map = L.map("map", { zoomControl: false }).setView([41.86, 14.29], 14);
  L.control.zoom({ position: "bottomright" }).addTo(map);

  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a>",
    maxZoom: 19,
  }).addTo(map);

  // ── Survey markers ────────────────────────────────────────────────────────────
  const markerStyle = {
    radius: 7,
    fillColor: "#2d6a4f",
    color: "#ffffff",
    weight: 2,
    opacity: 1,
    fillOpacity: 0.9,
  };

  MARKERS.forEach(function(m) {
    const photoUrl = PHOTO_BASE + m.photo;
    const popup = L.popup({ maxWidth: 340, className: "survey-popup" }).setContent(
      '<div class="popup-inner">' +
        '<div class="popup-row"><span class="popup-label">Data</span><span class="popup-val">' + m.date + '</span></div>' +
        '<div class="popup-row"><span class="popup-label">Altitudine</span><span class="popup-val">' + m.alt + ' m</span></div>' +
        '<div class="popup-row"><span class="popup-label">Punto</span><span class="popup-val">#' + m.id + '</span></div>' +
        '<div class="popup-photo"><img src="' + photoUrl + '" loading="lazy" alt="Foto punto ' + m.id + '" ' +
          'onerror="this.style.display=\'none\';this.parentNode.innerHTML=\'<span class=&quot;no-photo&quot;>Foto non disponibile</span>\'" /></div>' +
      '</div>'
    );
    L.circleMarker([m.lat, m.lng], markerStyle).bindPopup(popup).addTo(map);
  });

  // ── GeoJSON layers ────────────────────────────────────────────────────────────
  const layerCache   = {};  // id -> L.GeoJSON instance (cached after first fetch)
  const layerActive  = {};  // id -> boolean

  // Default: only the administrative boundary is active
  const DEFAULT_ACTIVE = ["limite"];

  function buildLayerList() {
    const container = document.getElementById("layer-list");
    GEOJSON_LAYERS.forEach(function(def) {
      const isActive = DEFAULT_ACTIVE.includes(def.id);
      layerActive[def.id] = false; // will be set in toggleLayer below

      const row = document.createElement("div");
      row.className = "layer-row";
      row.innerHTML =
        '<div class="layer-checkbox" id="chk-' + def.id + '">' +
          '<svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="2"><polyline points="1.5,5 4,7.5 8.5,2"/></svg>' +
        '</div>' +
        '<div class="layer-swatch" style="background:' + def.color + '"></div>' +
        '<span class="layer-name">' + def.name + '</span>';
      row.onclick = function() { toggleLayer(def.id, def); };
      container.appendChild(row);

      if (isActive) toggleLayer(def.id, def);
    });
  }

  function toggleLayer(id, def) {
    if (!def) def = GEOJSON_LAYERS.find(function(l){ return l.id === id; });
    const nowActive = !layerActive[id];
    layerActive[id] = nowActive;

    const chk = document.getElementById("chk-" + id);
    if (chk) {
      chk.style.borderColor  = nowActive ? def.color : "#ccc";
      chk.style.background   = nowActive ? def.color : "transparent";
      const svg = chk.querySelector("svg");
      if (svg) svg.style.display = nowActive ? "block" : "none";
    }

    if (nowActive) {
      if (layerCache[id]) {
        map.addLayer(layerCache[id]);
      } else {
        const url = RAW_BASE + encodeURIComponent(def.file);
        fetch(url)
          .then(function(r){ if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(function(geojson){
            const layer = L.geoJSON(geojson, {
              style: function() {
                return {
                  color:       def.color,
                  weight:      def.weight,
                  opacity:     0.9,
                  fillColor:   def.color,
                  fillOpacity: def.fill,
                };
              },
            });
            layerCache[id] = layer;
            // Only add if still active (user may have toggled off during fetch)
            if (layerActive[id]) map.addLayer(layer);
          })
          .catch(function(err){ console.warn("GeoJSON fetch failed for", id, err); });
      }
    } else {
      if (layerCache[id]) map.removeLayer(layerCache[id]);
    }

    updateBulkButtons();
  }

  function selectAll() {
    GEOJSON_LAYERS.forEach(function(def){
      if (!layerActive[def.id]) toggleLayer(def.id, def);
    });
  }

  function selectNone() {
    GEOJSON_LAYERS.forEach(function(def){
      if (layerActive[def.id]) toggleLayer(def.id, def);
    });
  }

  function updateBulkButtons() {
    const allOn  = GEOJSON_LAYERS.every(function(l){ return layerActive[l.id]; });
    const noneOn = GEOJSON_LAYERS.every(function(l){ return !layerActive[l.id]; });
    document.getElementById("btn-all").disabled  = allOn;
    document.getElementById("btn-none").disabled = noneOn;
  }

  // ── Panel toggle ──────────────────────────────────────────────────────────────
  let panelVisible = true;

  function togglePanel() {
    panelVisible = !panelVisible;
    document.getElementById("panel").classList.toggle("hidden", !panelVisible);
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  buildLayerList();
  updateBulkButtons();
  </script>
</body>
</html>
